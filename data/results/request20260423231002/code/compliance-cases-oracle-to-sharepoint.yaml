transformation:
  id: cmp-sa-031
  slug: compliance-cases-oracle-to-sharepoint
  name: Compliance Case Analytics Publish Feed

source:
  system: oracle-compliance-case-mart
  type: plsql-package
  package:
    name: HMRC_COMPLIANCE_ANALYTICS_PKG
    procedure: EXPORT_CASE_ANALYTICS
    parameters:
      - business_date
      - region_code

target:
  system: sharepoint
  outputs:
    - open_case_detail_YYYYMMDD.csv
    - officer_workload_summary_YYYYMMDD.csv
    - risk_trend_summary_YYYYMMDD.xlsx
    - upload_manifest_YYYYMMDD.csv

runtime:
  script: transformation.py
  env_file: .env.example
  required_env:
    - ORACLE_DSN
    - ORACLE_USER
    - ORACLE_PASSWORD
  optional_env:
    - REGION_CODE
    - SHAREPOINT_SITE_URL
    - SHAREPOINT_LIBRARY_PATH
    - SHAREPOINT_ACCESS_TOKEN

rules:
  load_type: incremental
  validations:
    - CASE_ID must be unique per business date
    - RISK_BAND must map to LOW MEDIUM HIGH or CRITICAL
    - OPEN_DATE must not be in the future
    - workload counts must be non-negative
