transformation:
  id: doc-cus-019
  slug: customs-declaration-pdf-to-snowflake
  name: Customs Declaration PDF Daily Feed

source:
  system: hmrc-customs-document-archive
  type: s3-objects
  objects:
    manifest: manifest_YYYYMMDD.json
    index: declaration_index_YYYYMMDD.csv
    documents: "*.pdf"

target:
  system: snowflake
  outputs:
    - curated_customs_declaration_header
    - curated_customs_declaration_line
    - customs_declaration_rejection_log

runtime:
  script: transformation.py
  env_file: .env.example
  required_env:
    - AWS_REGION
    - SOURCE_S3_BUCKET
    - MANIFEST_KEY_TEMPLATE
    - INDEX_KEY_TEMPLATE
  optional_env:
    - SNOWFLAKE_ACCOUNT
    - SNOWFLAKE_USER
    - SNOWFLAKE_PASSWORD
    - SNOWFLAKE_WAREHOUSE
    - SNOWFLAKE_DATABASE
    - SNOWFLAKE_SCHEMA
    - SNOWFLAKE_ROLE

rules:
  load_type: incremental
  validations:
    - Manifest and index must agree on batch scope
    - MRN must be unique within the batch
    - Commodity code must be 8 to 10 digits
    - Only manifest-listed PDFs may be processed
