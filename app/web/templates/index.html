<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Data Transformation Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body data-api-base="{{ api_base_url }}">
    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand-lockup">
            <span class="brand-mark">DT</span>
            <div>
              <p class="brand-kicker">Data Transformation Agent</p>
            </div>
          </div>

          <div class="sidebar-top-actions">
            <button id="newChatButton" type="button" class="sidebar-action">New chat</button>
            <form method="post" action="{{ url_for('logout') }}">
              <button type="submit" class="sidebar-action secondary">Sign out</button>
            </form>
          </div>
        </div>

        <section class="sidebar-section">
          <p class="sidebar-label">Session</p>
          <div id="sessionList" class="session-list"></div>
        </section>

        <section id="testCaseSection" class="sidebar-section hidden">
          <p class="sidebar-label">Preload test cases</p>
          <div id="testCaseList" class="sidebar-actions"></div>
        </section>

        <section id="modeSection" class="sidebar-section hidden">
          <p class="sidebar-label">Modes</p>
          <div id="modeList" class="sidebar-actions"></div>
        </section>

        <section id="subagentSection" class="sidebar-section hidden">
          <p class="sidebar-label">Tools</p>
          <div id="subagentList" class="sidebar-actions"></div>
        </section>
      </aside>

      <section class="chat-column">
        <header class="chat-header">
          <div>
            <p class="chat-eyebrow">Conversation</p>
            <h2>Start with a request or attach source evidence</h2>
          </div>
          <div id="alertStack" class="inline-alerts"></div>
        </header>

        <section id="messageList" class="message-list" aria-live="polite"></section>

        <form id="chatForm" class="composer-shell">
          <div id="commandMenu" class="command-menu hidden"></div>
          <div class="composer">
            <div class="composer-topline">
              <div id="composerMode" class="composer-mode"></div>
            </div>

            <div id="attachmentTray" class="attachment-tray hidden"></div>

            <textarea
              id="composerInput"
              name="message"
              rows="1"
              placeholder="Describe the transformation you want, then send when you are ready."
            ></textarea>

            <div class="composer-actions">
              <div class="composer-tools">
                <label class="composer-button">
                  <input id="uploadInput" type="file" name="file" multiple>
                  <span>Attach</span>
                </label>
                <button id="addLinkButton" type="button" class="composer-button secondary">Add link</button>
              </div>
              <button id="sendButton" type="submit" class="send-button">Send</button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
